name: Transcribe MP4 to VTT

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to upload VTT to"
        required: true

      asset_name:
        description: "MP4 asset name"
        required: true

      mp4_url:
        description: "Browser download URL of MP4"
        required: true

      model:
        description: Whisper model
        required: true
        default: large
        type: choice
        options:
          - tiny
          - base
          - small
          - medium
          - large

permissions:
  contents: write

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install openai-whisper moviepy

      - name: Download MP4
        run: |
          echo "Downloading:"
          echo "${{ github.event.inputs.mp4_url }}"

          curl -L \
            "${{ github.event.inputs.mp4_url }}" \
            -o input.mp4

          ls -lh input.mp4

      - name: Create transcription script
        run: |
          cat > transcript_to_vtt.py <<'PY'
          import whisper
          import argparse


          def timestamp(seconds):
              h = int(seconds // 3600)
              m = int((seconds % 3600) // 60)
              s = seconds % 60
              ms = int((s % 1) * 1000)

              return f"{h:02}:{m:02}:{int(s):02}.{ms:03}"


          parser = argparse.ArgumentParser()

          parser.add_argument(
              "input"
          )

          parser.add_argument(
              "-o",
              "--output",
              required=True
          )

          parser.add_argument(
              "-m",
              "--model",
              default="base"
          )


          args = parser.parse_args()


          print("Loading Whisper model...")
          model = whisper.load_model(args.model)


          print("Transcribing...")
          result = model.transcribe(
              args.input,
              language="en"
          )


          print("Writing VTT...")

          with open(
              args.output,
              "w",
              encoding="utf-8"
          ) as f:

              f.write("WEBVTT\n\n")

              for segment in result["segments"]:

                  start = timestamp(segment["start"])
                  end = timestamp(segment["end"])
                  text = segment["text"].strip()

                  if text:
                      f.write(
                          f"{start} --> {end}\n"
                      )
                      f.write(
                          text + "\n\n"
                      )

          print("Done")
          PY

      - name: Run transcription
        run: |
          output="${{ github.event.inputs.asset_name }}"
          output="${output%.mp4}.vtt"

          python transcript_to_vtt.py \
            input.mp4 \
            -o "$output" \
            -m "${{ github.event.inputs.model }}"

          echo "VTT created:"
          ls -lh "$output"

      - name: Upload VTT to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          output="${{ github.event.inputs.asset_name }}"
          output="${output%.mp4}.vtt"

          gh release upload \
            "${{ github.event.inputs.release_tag }}" \
            "$output" \
            --repo "${{ github.repository }}" \
            --clobber
